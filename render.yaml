services:
  - type: web
    name: org-system
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: AUTH_MODE
        value: google
      - key: DATABASE_URL
        fromDatabase:
          name: org-system-db
          property: connectionString
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_WORKSPACE_DOMAIN
        sync: false
      - key: ORG_SYSTEM_ADMIN_EMAILS
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: PUBLIC_URL
        fromService:
          type: web
          name: org-system
          envVarKey: RENDER_EXTERNAL_HOSTNAME
      - key: ALLOWED_ORIGINS
        fromService:
          type: web
          name: org-system
          envVarKey: RENDER_EXTERNAL_HOSTNAME

databases:
  - name: org-system-db
    plan: free
