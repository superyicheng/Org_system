# Template only: do not put a personal token or a real service URL in this repository.
# Each employee should add the enabled configuration from docs/CODEX_EMPLOYEE_SETUP.md
# to their own ~/.codex/config.toml after signing in to the hosted service.
[mcp_servers.org_system]
url = "https://replace-with-your-cloud-run-url/mcp/"
bearer_token_env_var = "ORG_SYSTEM_MCP_TOKEN"
enabled = false
required = false
tool_timeout_sec = 30
enabled_tools = ["avoid_duplicate_work", "recall_experience", "record_completed_work"]
default_tools_approval_mode = "writes"

[mcp_servers.org_system.tools.record_completed_work]
approval_mode = "writes"
